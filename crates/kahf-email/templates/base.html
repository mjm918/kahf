<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{{ subject }}</title>
  <style>
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; background-color: #F3F2F1; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #F3F2F1;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #F3F2F1;">
    <tr>
      <td align="center" style="padding: 40px 16px;">

        <table role="presentation" width="520" cellpadding="0" cellspacing="0" style="max-width: 520px; width: 100%; background-color: #FFFFFF; border-radius: 4px; border: 1px solid #EDEBE9;">
          <tr>
            <td style="padding: 32px 40px 0 40px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="font-size: 20px; font-weight: 600; color: #0078D4; padding-bottom: 4px;">
                    KahfLane
                  </td>
                </tr>
                <tr>
                  <td style="border-bottom: 2px solid #0078D4; padding-bottom: 0; line-height: 0; font-size: 0;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding: 28px 40px 32px 40px;">
              {% block content %}{% endblock content %}
            </td>
          </tr>

          <tr>
            <td style="padding: 0 40px 24px 40px; border-top: 1px solid #EDEBE9;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding-top: 20px; font-size: 12px; color: #A19F9D; line-height: 18px;">
                    This is an automated message from KahfLane. Please do not reply to this email.
                  </td>
                </tr>
                <tr>
                  <td style="padding-top: 8px; font-size: 11px; color: #C8C6C4; line-height: 16px;">
                    &copy; {{ year }} KahfLane &mdash; Project Management Platform
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
