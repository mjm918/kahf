uuid = { workspace = true }
chrono = { workspace = true }
eyre = { workspace = true }
color-eyre = { workspace = true }
dotenvy = { workspace = true }

[dev-dependencies]
reqwest = { workspace = true }
tower = { version = "0.5", features = ["util"] }
