<app-auth-layout>
  <div class="flex flex-col">
    <span class="text-md font-semibold" style="color: var(--color-sf-content-text-color)">Reset password</span>
    <span class="text-xs" style="color: var(--color-sf-content-text-color-alt2)">Enter the code sent to your email and your new password</span>
  </div>

  @if (error()) {
    <ejs-message severity="Error" cssClass="e-small" [showIcon]="true" [showCloseIcon]="false">
      {{ error() }}
    </ejs-message>
  }

  @if (success()) {
    <ejs-message severity="Success" cssClass="e-small mb-3" [showIcon]="true" [showCloseIcon]="false">
      {{ success() }} Redirecting to sign in...
    </ejs-message>
  } @else {
    <form (ngSubmit)="onSubmit()" class="flex flex-col gap-3">
      <ejs-textbox
        [(ngModel)]="email"
        name="email"
        placeholder="Email"

        type="email"
        class="w-full"
      ></ejs-textbox>
      <ejs-textbox
        [(ngModel)]="code"
        name="code"
        placeholder="Reset code"

        type="text"
        class="w-full"
      ></ejs-textbox>
      <ejs-textbox
        #passwordBox
        [(ngModel)]="newPassword"
        name="newPassword"
        placeholder="New password"
        type="password"
        class="w-full"
      ></ejs-textbox>
      <button
        ejs-button
        type="submit"
        [isPrimary]="true"
        [disabled]="loading()"
        [content]="loading() ? 'Resetting...' : 'Reset password'"
        class="w-full"
      ></button>
    </form>
  }

  <div class="mt-2 text-center text-xs" style="color: var(--color-sf-content-text-color-alt2)">
    <a routerLink="/auth/login" style="color: var(--color-sf-primary); cursor: pointer">Back to sign in</a>
  </div>
</app-auth-layout>
