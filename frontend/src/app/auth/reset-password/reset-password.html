<!-- Reset password page: email, OTP code, new password with strength meter, and confirm password inside shared auth layout. Validates password complexity and match before submission. -->

<app-auth-layout>
  <div class="flex flex-col mb-6">
    <span class="text-md font-semibold" style="color: var(--color-sf-content-text-color)">Reset password</span>
    <span class="text-xs" style="color: var(--color-sf-content-text-color-alt2)">Enter the code sent to your email and your new password</span>
  </div>

  @if (error()) {
    <ejs-message severity="Error" cssClass="e-small mb-3" [showIcon]="true" [showCloseIcon]="false">
      {{ error() }}
    </ejs-message>
  }

  @if (success()) {
    <ejs-message severity="Success" cssClass="e-small mb-3" [showIcon]="true" [showCloseIcon]="false">
      {{ success() }} Redirecting to sign in...
    </ejs-message>
  } @else {
    <form (ngSubmit)="onSubmit()" class="flex flex-col gap-2">
      <div class="flex flex-col gap-2">
        <span class="text-[10px] font-semibold" style="color: var(--color-sf-content-text-color-alt2); text-transform: uppercase; letter-spacing: 0.05em">
          Verification
        </span>
        <ejs-textbox
          [(ngModel)]="email"
          name="email"
          placeholder="Email"
          type="email"
          class="w-full"
        ></ejs-textbox>
        <div ejs-otpinput
          [length]="6"
          [type]="'Number'"
          [autoFocus]="true"
          [stylingMode]="'Outlined'"
          [placeholder]="'-'"
          cssClass="e-small"
          (valueChanged)="onOtpChange($event)"
        ></div>
      </div>

      <div style="border-top: 1px solid var(--color-sf-outline-color); margin: 2px 0"></div>

      <div class="flex flex-col gap-2">
        <span class="text-[10px] font-semibold" style="color: var(--color-sf-content-text-color-alt2); text-transform: uppercase; letter-spacing: 0.05em">
          New password
        </span>
        <div class="flex flex-col gap-1">
          <ejs-textbox
            #passwordBox
            [(ngModel)]="newPassword"
            name="newPassword"
            placeholder="New password"
            type="password"
            class="w-full"
            (input)="onConfirmInput()"
          ></ejs-textbox>
          <app-password-strength
            [password]="newPassword"
            (strengthChange)="onPasswordStrengthChange($event)"
          ></app-password-strength>
        </div>
        <div class="flex flex-col gap-1">
          <ejs-textbox
            #confirmBox
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm new password"
            type="password"
            class="w-full"
            (input)="onConfirmInput()"
          ></ejs-textbox>
          @if (confirmMismatch()) {
            <span class="text-[10px]" style="color: #D13438">Passwords do not match</span>
          }
        </div>
      </div>

      <button
        ejs-button
        type="submit"
        [isPrimary]="true"
        [disabled]="loading()"
        [content]="loading() ? 'Resetting...' : 'Reset password'"
        class="w-full mt-3"
      ></button>
    </form>
  }

  <div class="mt-3 text-center text-xs" style="color: var(--color-sf-content-text-color-alt2)">
    <a routerLink="/auth/login" style="color: var(--color-sf-primary); cursor: pointer">Back to sign in</a>
  </div>
</app-auth-layout>
