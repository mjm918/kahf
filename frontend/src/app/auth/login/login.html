<!-- Login page: email/password form inside shared auth layout. Shows signup link only when open registration is available. -->

<app-auth-layout>
  <div class="flex flex-col mb-6">
    <span class="text-md font-semibold" style="color: var(--color-sf-content-text-color)">Sign in</span>
    <span class="text-xs" style="color: var(--color-sf-content-text-color-alt2)">Enter your credentials to continue</span>
  </div>

  @if (registrationClosedMessage()) {
    <ejs-message severity="Warning" cssClass="e-small mb-3" [showIcon]="true" [showCloseIcon]="false">
      Registration is closed. New members can only join via invitation from the tenant owner.
    </ejs-message>
  }

  @if (error()) {
    <ejs-message severity="Error" cssClass="e-small mb-3" [showIcon]="true" [showCloseIcon]="false">
      {{ error() }}
    </ejs-message>
  }

  <form (ngSubmit)="onSubmit()" class="flex flex-col gap-3">
    <ejs-textbox
      [(ngModel)]="email"
      name="email"
      placeholder="Email"

      type="email"
      class="w-full"
    ></ejs-textbox>
    <ejs-textbox
      #passwordBox
      [(ngModel)]="password"
      name="password"
      placeholder="Password"
      type="password"
      class="w-full"
    ></ejs-textbox>
    <div class="flex justify-between items-center">
      <ejs-checkbox
        [(ngModel)]="rememberMe"
        name="rememberMe"
        label="Remember me"
        cssClass="e-small"
      ></ejs-checkbox>
      <a routerLink="/auth/forgot-password" class="text-xs cursor-pointer" style="color: var(--color-sf-primary)">Forgot password?</a>
    </div>
    <button
      ejs-button
      type="submit"
      [isPrimary]="true"
      [disabled]="loading()"
      [content]="loading() ? 'Signing in...' : 'Sign in'"
      class="w-full"
    ></button>
  </form>

  @if (showSignupLink()) {
    <div class="mt-3 text-center text-xs" style="color: var(--color-sf-content-text-color-alt2)">
      Don't have an account?
      <a routerLink="/auth/signup" style="color: var(--color-sf-primary); cursor: pointer">Sign up</a>
    </div>
  }
</app-auth-layout>
