<!-- Signup page: name/email/password form inside shared auth layout. -->

<app-auth-layout>
  <div class="flex flex-col">
    <span class="text-md font-semibold" style="color: var(--color-sf-content-text-color)">Create account</span>
    <span class="text-xs" style="color: var(--color-sf-content-text-color-alt2)">Sign up to get started with Kahf</span>
  </div>

  @if (error()) {
    <div class="mb-1 p-1.5 rounded text-xs" style="background: var(--color-sf-danger-light-alt); color: var(--color-sf-danger)">
      {{ error() }}
    </div>
  }

  <form (ngSubmit)="onSubmit()" class="flex flex-col">
    <ejs-textbox
      [(ngModel)]="name"
      name="name"
      placeholder="Full name"
      [floatLabelType]="'Auto'"
      class="w-full"
    ></ejs-textbox>
    <ejs-textbox
      [(ngModel)]="email"
      name="email"
      placeholder="Email"
      [floatLabelType]="'Auto'"
      type="email"
      class="w-full"
    ></ejs-textbox>
    <ejs-textbox
      [(ngModel)]="password"
      name="password"
      placeholder="Password"
      [floatLabelType]="'Auto'"
      type="password"
      class="w-full"
    ></ejs-textbox>
    <button
      ejs-button
      type="submit"
      [isPrimary]="true"
      [disabled]="loading()"
      [content]="loading() ? 'Creating account...' : 'Sign up'"
      class="w-full mt-4"
    ></button>
  </form>

  <div class="mt-1.5 text-center text-xs" style="color: var(--color-sf-content-text-color-alt2)">
    Already have an account?
    <a routerLink="/auth/login" style="color: var(--color-sf-primary); cursor: pointer">Sign in</a>
  </div>
</app-auth-layout>
