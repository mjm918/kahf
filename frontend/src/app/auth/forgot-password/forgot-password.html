<app-auth-layout>
  <div class="flex flex-col mb-6">
    <span class="text-md font-semibold" style="color: var(--color-sf-content-text-color)">Forgot password</span>
    <span class="text-xs" style="color: var(--color-sf-content-text-color-alt2)">Enter your email to receive a reset code</span>
  </div>

  @if (error()) {
    <ejs-message severity="Error" cssClass="e-small mb-3" [showIcon]="true" [showCloseIcon]="false">
      {{ error() }}
    </ejs-message>
  }

  @if (success()) {
    <ejs-message severity="Success" cssClass="e-small" [showIcon]="true" [showCloseIcon]="false">
      {{ success() }}
    </ejs-message>
    <div class="flex flex-col gap-2">
      <button
        ejs-button
        type="button"
        [isPrimary]="true"
        content="Enter reset code"
        class="w-full"
        (click)="goToReset()"
      ></button>
      <button
        ejs-button
        type="button"
        content="Resend code"
        class="w-full"
        [disabled]="loading()"
        (click)="onSubmit()"
      ></button>
    </div>
  } @else {
    <form (ngSubmit)="onSubmit()" class="flex flex-col gap-3">
      <ejs-textbox
        [(ngModel)]="email"
        name="email"
        placeholder="Email"

        type="email"
        class="w-full"
      ></ejs-textbox>
      <button
        ejs-button
        type="submit"
        [isPrimary]="true"
        [disabled]="loading()"
        [content]="loading() ? 'Sending...' : 'Send reset code'"
        class="w-full"
      ></button>
    </form>
  }

  <div class="mt-3 text-center text-xs" style="color: var(--color-sf-content-text-color-alt2)">
    <a routerLink="/auth/login" style="color: var(--color-sf-primary); cursor: pointer">Back to sign in</a>
  </div>
</app-auth-layout>
