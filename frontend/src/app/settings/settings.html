<div class="flex h-full">
  <div class="flex flex-col h-full border-r" style="width: 240px; min-width: 240px; background: #FAF9F8; border-color: #EDEBE9">
    <div class="flex items-center gap-2 px-4 py-3" style="border-bottom: 1px solid #EDEBE9">
      <button
        class="border-none bg-transparent cursor-pointer p-0 flex items-center"
        (click)="goBack()"
        title="Back"
      >
        <span class="e-icons e-arrow-left" style="font-size: 14px; color: #323130"></span>
      </button>
      <span class="text-sm font-semibold" style="color: #323130">Settings</span>
    </div>

    <div class="flex-1 overflow-y-auto">
      <div class="flex flex-col py-1">
        @for (item of userSettings; track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="settings-nav-active"
            class="flex items-center gap-2.5 px-4 py-1.5 text-xs no-underline cursor-pointer"
            style="color: #323130"
          >
            <span [class]="item.iconCss" style="font-size: 14px;"></span>
            <span>{{ item.label }}</span>
          </a>
        }
      </div>

      <div class="px-4 pt-3 pb-1">
        <span class="text-[10px] font-semibold tracking-wide" style="color: #A19F9D; text-transform: uppercase; letter-spacing: 0.05em">Workspace settings</span>
      </div>
      <div class="flex flex-col py-1">
        @for (item of workspaceSettings; track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="settings-nav-active"
            class="flex items-center gap-2.5 px-4 py-1.5 text-xs no-underline cursor-pointer"
            style="color: #323130"
          >
            <span [class]="item.iconCss" style="font-size: 14px; color: #605E5C"></span>
            <span>{{ item.label }}</span>
          </a>
        }
      </div>
    </div>
  </div>

  <div class="flex-1 overflow-auto" style="background: #fff">
    <router-outlet></router-outlet>
  </div>
</div>
