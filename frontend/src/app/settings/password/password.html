<div class="p-6 max-w-lg">
  <h2 class="text-base font-semibold mt-0 mb-4" style="color: #323130">Change password</h2>

  @if (error()) {
    <ejs-message severity="Error" cssClass="e-small mb-3" [showIcon]="true" [showCloseIcon]="false">
      {{ error() }}
    </ejs-message>
  }

  @if (success()) {
    <ejs-message severity="Success" cssClass="e-small mb-3" [showIcon]="true" [showCloseIcon]="false">
      {{ success() }}
    </ejs-message>
  }

  <div class="flex flex-col gap-3">
    <div>
      <label class="text-xs font-semibold mb-1 block" style="color: #605E5C">Current password</label>
      <ejs-textbox #currentBox [(ngModel)]="currentPassword" type="password" placeholder="Enter current password" cssClass="e-small"></ejs-textbox>
    </div>
    <div>
      <label class="text-xs font-semibold mb-1 block" style="color: #605E5C">New password</label>
      <ejs-textbox
        #newBox
        [(ngModel)]="newPassword"
        type="password"
        placeholder="Enter new password"
        cssClass="e-small"
        (input)="onConfirmInput()"
      ></ejs-textbox>
      <app-password-strength
        [password]="newPassword"
        (strengthChange)="onPasswordStrengthChange($event)"
      ></app-password-strength>
    </div>
    <div>
      <label class="text-xs font-semibold mb-1 block" style="color: #605E5C">Confirm new password</label>
      <ejs-textbox
        #confirmBox
        [(ngModel)]="confirmPassword"
        type="password"
        placeholder="Confirm new password"
        cssClass="e-small"
        (input)="onConfirmInput()"
      ></ejs-textbox>
      @if (confirmMismatch()) {
        <span class="text-[10px] mt-1 block" style="color: #D13438">Passwords do not match</span>
      }
    </div>
    <div class="mt-2">
      <button
        ejs-button
        cssClass="e-small"
        [isPrimary]="true"
        [disabled]="loading()"
        [content]="loading() ? 'Changing...' : 'Change password'"
        (click)="onChangePassword()"
      ></button>
    </div>
  </div>
</div>
