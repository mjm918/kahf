<div class="p-6 max-w-lg">
  <h2 class="text-base font-semibold mt-0 mb-4" style="color: #323130">Notifications</h2>

  @if (error()) {
    <ejs-message severity="Error" cssClass="e-small mb-3" [showIcon]="true" [showCloseIcon]="false">
      {{ error() }}
    </ejs-message>
  }

  @if (loading()) {
    <p class="text-xs" style="color: #605E5C">Loading preferences...</p>
  } @else {
    <div class="flex flex-col gap-2">
      @for (card of channels(); track card.channel) {
        <div class="flex items-center gap-3 px-3 py-2.5 rounded" style="border: 1px solid #EDEBE9">
          <div
            class="flex items-center justify-center rounded-sm shrink-0"
            [style.background]="card.color"
            style="width: 28px; height: 28px; font-size: 12px; color: #fff; font-weight: 600"
          >{{ card.icon }}</div>
          <div class="flex-1 min-w-0">
            <div class="text-xs font-semibold" style="color: #323130">{{ card.label }}</div>
            <div class="text-[11px]" style="color: #A19F9D">{{ card.description }}</div>
          </div>
          <ejs-switch
            cssClass="e-small"
            [checked]="card.enabled"
            (change)="onToggle(card)"
          ></ejs-switch>
        </div>
      }
    </div>
  }
</div>
