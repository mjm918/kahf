@if (visible()) {
  <div class="flex flex-col gap-1 mt-1">
    <div class="flex items-center gap-1.5">
      @for (bar of bars(); track $index) {
        <div class="flex-1 rounded-sm overflow-hidden" style="height: 4px; background: #EDEBE9">
          <div
            class="h-full rounded-sm"
            [style.width]="bar.active ? '100%' : '0%'"
            [style.background]="bar.color"
            style="transition: width 0.2s ease, background 0.2s ease"
          ></div>
        </div>
      }
      <span class="text-[11px] font-medium shrink-0 ml-1" style="min-width: 40px; text-align: right" [style.color]="labelColor()">
        {{ label() }}
      </span>
    </div>
    <div class="flex flex-wrap gap-x-3 gap-y-0.5">
      @for (check of checks; track check.label; let i = $index) {
        <span class="text-[10px]" [style.color]="checkResults()[i] ? '#107C10' : '#A19F9D'">
          {{ checkResults()[i] ? '&#x2713;' : '&#x2022;' }} {{ check.label }}
        </span>
      }
    </div>
  </div>
}
